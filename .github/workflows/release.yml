name: Release

on:
  workflow_dispatch:
    inputs:
      batch:
        description: "Lote a publicar (1-6, o 'all')"
        required: true
        default: "1"
        type: choice
        options:
          - "1"
          - "2"
          - "3"
          - "4"
          - "5"
          - "6"
          - all
      tag:
        description: "Tag de release (ej. v1.0.0-batch1)"
        required: true
        default: "v1.0.0-batch1"

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip build

      - name: Ensure module READMEs
        run: python tools/ensure_module_readmes.py

      - name: Package release batch(es)
        run: |
          if [ "${{ inputs.batch }}" = "all" ]; then
            python tools/package_release_batch.py --all
          else
            python tools/package_release_batch.py --batch "${{ inputs.batch }}"
          fi

      - name: Build snocomm executable
        run: |
          pip install -e ".[executable]"
          python tools/build_executable.py --onefile --clean

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: Snocomm Suite ${{ inputs.tag }}
          generate_release_notes: true
          files: |
            dist/releases/**/snocomm-batch*.zip
            dist/releases/**/SHA256SUMS
            dist/releases/**/build-report.json
            dist/releases/**/artifacts/*.whl
            dist/releases/**/artifacts/*.tar.gz
            dist/snocomm
            dist/snocomm.exe